<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#1e293b" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="유준이의 일주일" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="icon" href="icon-192.png" />
  <title>유준이의 일주일</title>

  <!-- Tailwind (JIT, scans the rendered page) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React 18 (전역 변수 방식 UMD 빌드: import map이 필요 없어서
       오래된/일부 모바일 브라우저에서도 안정적으로 동작합니다) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

  <!-- Firebase (호환 버전: 일반 <script> 태그로 바로 쓸 수 있는 전역 firebase 객체 제공) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

  <!-- Babel standalone: app.jsx의 JSX 문법만 변환합니다 (import/export 없음) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html, body, #root { height: 100%; }
    body { margin: 0; -webkit-tap-highlight-color: transparent; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div id="root">
    <div style="min-height:100vh; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-family:sans-serif;">
      불러오는 중...
    </div>
  </div>

  <!-- Firebase 초기화 (일반 스크립트, window.db를 전역으로 만들어둠) -->
  <script src="firebase-config.js"></script>

  <!-- 앱 본체: JSX만 변환되는 일반 스크립트로 실행 (ES모듈 아님) -->
  <script type="text/babel" data-presets="react" src="app.jsx"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
